<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>弱電工程客服 - 障礙申報系統</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Noto Sans TC", "Microsoft JhengHei", Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .header p {
            opacity: 0.9;
        }
        .form-content {
            padding: 30px;
        }
        .section {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #f0f0f0;
        }
        .section:last-child {
            border-bottom: none;
        }
        .section-title {
            color: #1e3c72;
            font-size: 18px;
            margin-bottom: 20px;
            padding-left: 15px;
            border-left: 4px solid #1e3c72;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }
        label .required {
            color: #e74c3c;
        }
        input[type="text"],
        input[type="tel"],
        input[type="date"],
        input[type="datetime-local"],
        select,
        textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
            font-family: inherit;
        }
        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: #2a5298;
        }
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        @media (max-width: 600px) {
            .row {
                grid-template-columns: 1fr;
            }
        }
        .price-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        .price-table th,
        .price-table td {
            padding: 12px;
            text-align: left;
            border: 1px solid #ddd;
        }
        .price-table th {
            background: #f5f5f5;
            color: #333;
        }
        .price-table tr:last-child td {
            border-bottom: 1px solid #ddd;
        }
        .price-note {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            font-size: 14px;
            color: #856404;
        }
        .btn-submit {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(42, 82, 152, 0.4);
        }
        .footer {
            background: #f8f9fa;
            padding: 20px;
            text-align: center;
            color: #666;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔧 弱電工程障礙申報系統</h1>
            <p>專業弱電工程維修服務 - 監視系統、電話交換機、社區對講機、網路系統</p>
        </div>
        
        <form class="form-content" id="faultForm">
            <!-- 客戶資訊區 -->
            <div class="section">
                <h2 class="section-title">📋 客戶資訊</h2>
                
                <div class="row">
                    <div class="form-group">
                        <label>接收問題聯絡人 <span class="required">*</span></label>
                        <input type="text" name="receiver" required placeholder="誰收到這則問題">
                    </div>
                    <div class="form-group">
                        <label>客戶名稱 <span class="required">*</span></label>
                        <input type="text" name="customerName" required placeholder="公司/社區名稱">
                    </div>
                </div>
                
                <div class="row">
                    <div class="form-group">
                        <label>客戶聯絡人 <span class="required">*</span></label>
                        <input type="text" name="contactPerson" required placeholder="聯絡人姓名">
                    </div>
                    <div class="form-group">
                        <label>客戶電話 <span class="required">*</span></label>
                        <input type="tel" name="contactPhone" required placeholder="09XX-XXX-XXX">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>問題發生日期 <span class="required">*</span></label>
                    <input type="datetime-local" name="faultDate" required>
                </div>
            </div>
            
            <!-- 問題描述區 -->
            <div class="section">
                <h2 class="section-title">🔍 問題描述</h2>
                
                <div class="form-group">
                    <label>問題分類 <span class="required">*</span></label>
                    <select name="faultCategory" required>
                        <option value="">請選擇問題類型</option>
                        <optgroup label="監視系統">
                            <option value="監視器-昇銳">監視器 - 昇銳</option>
                            <option value="監視器-KIM廣佑">監視器 - KIM廣佑</option>
                            <option value="監視系統-其他">監視系統 - 其他</option>
                        </optgroup>
                        <optgroup label="電話交換機">
                            <option value="電話交換機-東訊">電話交換機 - 東訊</option>
                            <option value="電話交換機-通航">電話交換機 - 通航聯盟</option>
                           電話交換機- <option value="萬國">電話交換機 - 萬國</option>
                            <option value="電話交換機-其他">電話交換機 - 其他</option>
                        </optgroup>
                        <optgroup label="社區對講機">
                            <option value="對講機-歐益">對講機 - 歐益</option>
                            <option value="對講機-俞是牌">對講機 - 俞是牌</option>
                            <option value="對講機-鎧鋒">對講機 - 鎧鋒</option>
                            <option value="對講機-其他">對講機 - 其他</option>
                        </optgroup>
                        <optgroup label="網路系統">
                            <option value="網路-TP-link">網路系統 - TP-link</option>
                            <option value="網路-其他">網路系統 - 其他</option>
                        </optgroup>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>問題描述 <span class="required">*</span></label>
                    <textarea name="faultDescription" required placeholder="請詳細描述問題情況，例如：某支監視器無訊號、某台電話無法通話等"></textarea>
                </div>
                
                <div class="form-group">
                    <label>問題照片/影片連結</label>
                    <input type="url" name="mediaLink" placeholder="Google Drive / LINE 相簿 / Dropbox 連結">
                    <small style="color: #666;">請提供可開啟的共用連結</small>
                </div>
            </div>
            
            <!-- 收費說明區 -->
            <div class="section">
                <h2 class="section-title">💰 收費標準</h2>
                
                <table class="price-table">
                    <thead>
                        <tr>
                            <th>項目</th>
                            <th>費用</th>
                            <th>說明</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>保固期內</td>
                            <td><strong>免費</strong></td>
                            <td>一年保固內免費維修</td>
                        </tr>
                        <tr>
                            <td>基本車馬費</td>
                            <td><strong>800 元</strong></td>
                            <td>每次出車基本費用</td>
                        </tr>
                        <tr>
                            <td>查修工資</td>
                            <td><strong>待報價</strong></td>
                            <td>依問題複雜程度報價</td>
                        </tr>
                        <tr>
                            <td>稅金</td>
                            <td><strong>+5%</strong></td>
                            <td>需開發票者加收</td>
                        </tr>
                        <tr>
                            <td>更換新品</td>
                            <td><strong>另計</strong></td>
                            <td>材料費另行報價</td>
                        </tr>
                    </tbody>
                </table>
                
                <div class="price-note">
                    ⚠️ 實際收費以工程人員現場評估為準，維修前會先提供報價單確認
                </div>
            </div>
            
            <!-- 內部填寫區（工程人員用） -->
            <div class="section">
                <h2 class="section-title">👷 工程人員專區</h2>
                
                <div class="row">
                    <div class="form-group">
                        <label>處理工程人員</label>
                        <input type="text" name="engineer" placeholder="處理人員姓名">
                    </div>
                    <div class="form-group">
                        <label>處理日期</label>
                        <input type="date" name="processDate">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>處理結果紀錄</label>
                    <textarea name="result" placeholder="維修過程、問題根因、處理方式、結果"></textarea>
                </div>
            </div>
            
            <button type="submit" class="btn-submit">📝 提交障礙申報</button>
        </form>
        
        <div class="footer">
            <p>如有任何問題，歡迎聯繫我們</p>
            <p>© 2026 弱電工程客服系統</p>
        </div>
    </div>
    
    <script>
        document.getElementById('faultForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('感謝您的障礙申報！我們會盡快處理！');
            // 這裡可以串接 Google Sheets、Notion 或其他資料庫
        });
    </script>
</body>
</html>
