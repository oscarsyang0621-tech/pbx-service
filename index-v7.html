<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>弱電工程客服系統 V7</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--primary:#1e3c72;--primary-light:#2a5298;--success:#28a745;--warning:#ffc107;--danger:#dc3545}
        body{font-family:"Noto Sans TC","Microsoft JhengHei",Arial,sans-serif;background:linear-gradient(135deg,#1e3c72,#2a5298);min-height:100vh;padding:10px}
        .container{max-width:800px;margin:0 auto;background:#fff;border-radius:15px;box-shadow:0 10px 40px rgba(0,0,0,.2)}
        .navbar{background:var(--primary);color:#fff;padding:15px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
        .navbar h1{font-size:18px}
        .nav-buttons{display:flex;gap:8px;flex-wrap:wrap}
        .nav-btn{padding:8px 12px;background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:20px;cursor:pointer;font-size:13px}
        .nav-btn:hover,.nav-btn.active{background:rgba(255,255,255,.4)}
        .tab-content{display:none}
        .tab-content.active{display:block}
        .form-section{padding:20px;border-bottom:2px solid #f0f0f0}
        .form-section h2{color:var(--primary);font-size:16px;margin-bottom:15px;padding-left:10px;border-left:4px solid var(--primary)}
        .form-grid{display:grid;grid-template-columns:1fr;gap:15px}
        @media(min-width:768px){.form-grid{grid-template-columns:1fr 1fr}}
        .form-group{margin-bottom:15px}
        label{display:block;margin-bottom:5px;color:#333;font-weight:500;font-size:14px}
        label .required{color:var(--danger)}
        input,select,textarea{width:100%;padding:12px;border:2px solid #e0e0e0;border-radius:8px;font-size:16px;font-family:inherit}
        input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary-light)}
        textarea{min-height:80px;resize:vertical}
        .hidden{display:none !important}
        .btn{padding:12px 25px;border:none;border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer;width:100%;background:linear-gradient(135deg,var(--primary),var(--primary-light));color:#fff}
        @media(min-width:768px){.btn{width:auto}}
        .task-card{background:#fff;border:1px solid #ddd;border-radius:10px;padding:15px;margin-bottom:15px}
        .task-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
        .task-id{background:var(--primary);color:#fff;padding:5px 12px;border-radius:15px;font-size:12px}
        .task-status{padding:5px 12px;border-radius:15px;font-size:12px;font-weight:bold}
        .status-new{background:#e3f2fd;color:#1565c0}
        .status-processing{background:#fff3e0;color:#e65100}
        .status-completed{background:#e8f5e9;color:#2e7d32}
        .task-info{font-size:13px}
        .task-actions{display:flex;gap:10px;margin-top:10px}
        .task-actions button{flex:1;padding:10px;border:none;border-radius:8px;cursor:pointer}
        .btn-primary{background:var(--primary);color:#fff}
        .btn-success{background:var(--success);color:#fff}
        .filter-bar{padding:15px;background:#f8f9fa;display:flex;gap:10px;flex-wrap:wrap}
        .filter-bar select{flex:1;min-width:140px}
        .modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1000;overflow-y:auto}
        .modal.active{display:block}
        .modal-content{background:#fff;margin:20px auto;max-width:500px;border-radius:15px;padding:20px}
        .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
        .modal-close{background:0;border:none;font-size:24px;cursor:pointer}
        .note{font-size:12px;color:#666;margin-top:5px}
    </style>
</head>
<body>
<div class="container">
    <div class="navbar">
        <h1>弱電工程客服系統</h1>
        <div class="nav-buttons">
            <button class="nav-btn active" onclick="showTab('new')">+ 新建案件</button>
            <button class="nav-btn" onclick="showTab('list')">案件列表</button>
        </div>
    </div>
    
    <div id="tab-new" class="tab-content active">
        <form id="faultForm">
            <div class="form-section">
                <h2>客戶資訊</h2>
                <div class="form-grid">
                    <div class="form-group"><label>接收問題人員 <span class="required">*</span></label><input type="text" name="receiver" required></div>
                    <div class="form-group"><label>客戶名稱 <span class="required">*</span></label><input type="text" name="customerName" required></div>
                    <div class="form-group"><label>客戶聯絡人 <span class="required">*</span></label><input type="text" name="contactPerson" required></div>
                    <div class="form-group"><label>客戶電話 <span class="required">*</span></label><input type="tel" name="contactPhone" required></div>
                    <div class="form-group"><label>問題發生時間 <span class="required">*</span></label><input type="datetime-local" name="faultDate" required></div>
                </div>
            </div>
            
            <div class="form-section">
                <h2>問題描述</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label>問題分類 <span class="required">*</span></label>
                        <select id="categorySelect" required>
                            <option value="">請選擇問題類型</option>
                            <option value="監視系統">監視系統</option>
                            <option value="電話交換機">電話交換機系統</option>
                            <option value="對講機">社區對講機系統</option>
                            <option value="網路系統">網路系統</option>
                            <option value="其他">其他</option>
                        </select>
                    </div>
                    
                    <!-- 選擇其他時顯示的手動輸入欄位 -->
                    <div class="form-group hidden" id="categoryOtherGroup">
                        <label>請輸入問題分類 <span class="required">*</span></label>
                        <input type="text" id="categoryOther" placeholder="例如：門禁系統、保全系統">
                    </div>
                    
                    <div class="form-group">
                        <label>廠牌 <span class="required">*</span></label>
                        <select id="brandSelect" name="faultBrand" required disabled>
                            <option value="">請先選擇問題分類</option>
                        </select>
                    </div>
                    
                    <!-- 選擇其他時顯示的手動輸入欄位 -->
                    <div class="form-group hidden" id="brandOtherGroup">
                        <label>請輸入廠牌名稱 <span class="required">*</span></label>
                        <input type="text" id="brandOther" placeholder="例如：XXX牌">
                    </div>
                    
                    <div class="form-group" style="grid-column:1/-1">
                        <label>問題描述 <span class="required">*</span></label>
                        <textarea name="faultDescription" required></textarea>
                    </div>
                </div>
            </div>
            
            <div style="padding:20px"><button type="submit" class="btn">提交障礙申報</button></div>
        </form>
    </div>
    
    <div id="tab-list" class="tab-content">
        <div class="filter-bar">
            <select id="filterStatus" onchange="renderTasks()"><option value="">全部狀態</option><option value="new">新案件</option><option value="processing">處理中</option><option value="completed">已完成</option></select>
            <select id="filterCategory" onchange="renderTasks()"><option value="">全部類型</option><option value="監視系統">監視系統</option><option value="電話交換機">電話交換機</option><option value="對講機">對講機</option><option value="網路系統">網路系統</option><option value="其他">其他</option></select>
        </div>
        <div id="taskList" style="padding:15px"></div>
    </div>
</div>

<div id="detailModal" class="modal">
    <div class="modal-content">
        <div class="modal-header"><h2>案件詳情</h2><button class="modal-close" onclick="closeModal()">X</button></div>
        <div id="modalBody"></div>
    </div>
</div>

<script>
// 品牌資料
const brandsData = {
    "監視系統": ["昇銳", "KIM廣佑", "其他"],
    "電話交換機": ["東訊", "通航聯盟", "萬國", "其他"],
    "對講機": ["歐益", "俞氏牌", "鎧鋒", "其他"],
    "網路系統": ["TP-link", "其他"],
    "其他": ["其他"]
};

// 當分類改變時
document.getElementById('categorySelect').addEventListener('change', function() {
    const category = this.value;
    const brandSelect = document.getElementById('brandSelect');
    const categoryOtherGroup = document.getElementById('categoryOtherGroup');
    const brandOtherGroup = document.getElementById('brandOtherGroup');
    
    // 如果選擇「其他」，顯示分類的手動輸入欄位
    if (category === '其他') {
        categoryOtherGroup.classList.remove('hidden');
    } else {
        categoryOtherGroup.classList.add('hidden');
    }
    
    // 重置廠牌選單
    brandOtherGroup.classList.add('hidden');
    
    if (category && brandsData[category]) {
        brandSelect.disabled = false;
        brandSelect.innerHTML = '<option value="">請選擇廠牌</option>';
        brandsData[category].forEach(brand => {
            brandSelect.innerHTML += '<option value="' + brand + '">' + brand + '</option>';
        });
    } else {
        brandSelect.disabled = true;
        brandSelect.innerHTML = '<option value="">請先選擇問題分類</option>';
    }
});

// 當廠牌改變時
document.getElementById('brandSelect').addEventListener('change', function() {
    const brand = this.value;
    const brandOtherGroup = document.getElementById('brandOtherGroup');
    
    // 如果選擇「其他」，顯示廠牌的手動輸入欄位
    if (brand === '其他') {
        brandOtherGroup.classList.remove('hidden');
    } else {
        brandOtherGroup.classList.add('hidden');
    }
});

// 顯示分頁
function showTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tabId).classList.add('active');
    event.target.classList.add('active');
}

// 任務資料
let tasks = JSON.parse(localStorage.getItem('faultTasks')) || [];

// 提交表單
document.getElementById('faultForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const formData = new FormData(e.target);
    
    // 取得分類和廠牌
    let category = document.getElementById('categorySelect').value;
    let brand = document.getElementById('brandSelect').value;
    
    // 如果選擇「其他」，使用手動輸入的值
    if (category === '其他') {
        category = document.getElementById('categoryOther').value || '其他';
    }
    if (brand === '其他') {
        brand = document.getElementById('brandOther').value || '其他';
    }
    
    const task = {
        id: 'F' + Date.now(),
        receiver: formData.get('receiver'),
        customerName: formData.get('customerName'),
        contactPerson: formData.get('contactPerson'),
        contactPhone: formData.get('contactPhone'),
        faultDate: formData.get('faultDate'),
        faultCategory: category,
        faultBrand: brand,
        faultDescription: formData.get('faultDescription'),
        status: 'new',
        createdAt: new Date().toISOString()
    };
    
    tasks.unshift(task);
    localStorage.setItem('faultTasks', JSON.stringify(tasks));
    alert('案件已提交！編號：' + task.id);
    
    // 重置表單
    e.target.reset();
    document.getElementById('brandSelect').disabled = true;
    document.getElementById('brandSelect').innerHTML = '<option value="">請先選擇問題分類</option>';
    document.getElementById('categoryOtherGroup').classList.add('hidden');
    document.getElementById('brandOtherGroup').classList.add('hidden');
    
    showTab('list');
    renderTasks();
});

// 渲染任務列表
function renderTasks() {
    const container = document.getElementById('taskList');
    const statusFilter = document.getElementById('filterStatus').value;
    const categoryFilter = document.getElementById('filterCategory').value;
    
    let filtered = tasks.filter(t => {
        if (statusFilter && t.status !== statusFilter) return false;
        if (categoryFilter && t.faultCategory !== categoryFilter) return false;
        return true;
    });
    
    if (filtered.length === 0) {
        container.innerHTML = '<p style="text-align:center;color:#666;padding:40px">尚無案件</p>';
        return;
    }
    
    container.innerHTML = filtered.map(t => {
        const statusClass = t.status === 'new' ? 'status-new' : t.status === 'processing' ? 'status-processing' : 'status-completed';
        const statusText = t.status === 'new' ? '新案件' : t.status === 'processing' ? '處理中' : '已完成';
        return '<div class="task-card"><div class="task-header"><span class="task-id">' + t.id + '</span><span class="task-status ' + statusClass + '">' + statusText + '</span></div><div class="task-info"><div><strong>客戶：</strong>' + t.customerName + '</div><div><strong>類型：</strong>' + t.faultCategory + ' - ' + t.faultBrand + '</div></div><div class="task-actions"><button class="btn-primary" onclick="alert(\'' + t.faultDescription.replace(/'/g, "\\'") + '\')">查看描述</button></div></div>';
    }).join('');
}

// 初始渲染
renderTasks();
</script>
</body>
</html>
